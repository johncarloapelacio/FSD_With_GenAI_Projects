<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>    
</head>
<body class="h-screen bg-fixed bg-[url('images/mainBG2.png')] bg-cover bg-center bg-no-repeat">
    <nav class="bg-purple-200 shadow-lg flex flex-col md:flex-row items-center justify-between pl-11 pr-7 py-4 mb-5">
        <div class="flex items-center space-x-11">
            <h1 class="text-5xl font-serif font-bold italic text-green-800">John Carlo's</h1>
            <span id="emailDisplay" class="ml-4 text-gray-700 text-2xl font-bold italic" ></span>
            <span id="itemsInCart" class="ml-2 text-black font-bold text-green-800 px-2 py-1 rounded text-xl"></span>
        </div>
        <div class="mt-4 md:mt-0 flex space-x-4">

            <input type="button" value="Checkout" onclick="checkOut()"
                   class="bg-green-700 hover:bg-green-800 text-white font-bold py-2 px-4 rounded-4xl transition-colors duration-200 cursor-pointer"/>
            <input type="button" value="Sign Out" onclick="signOut()"
                   class="bg-gray-600 hover:bg-black text-white font-bold py-2 px-4 rounded-4xl transition-colors duration-200 cursor-pointer"/>
        </div>
    </nav>
    <main class="container mx-auto px-4">
        <div class="parent-container">
            <div class="text-center mx-auto py-8 space-x-5">
            <input type="button" value="Menu" onclick="displayMenu()"
                   class=" text-xl bg-purple-300 shadow-lg hover:bg-purple-400 text-green-900 font-bold py-2 px-10 rounded-4xl transition-colors duration-200 cursor-pointer"/>
            <input type="button" value="Cart" onclick="displayCart()"
                   class="text-xl bg-purple-300 shadow-lg hover:bg-purple-400 text-green-900 font-bold py-2 px-11 rounded-4xl transition-colors duration-200 cursor-pointer"/>
            </div>
        </div>
        <section id="menuDisplay" class="grid grid-cols-1 md:grid-cols-4 gap-16 p-16 bg-[url('images/menuBG.jpg')] bg-cover rounded-4xl shadow mb-8">
            <!-- Food items will be rendered here -->
        </section>
        <section id="cartDisplay" class="bg-[url('images/menuBG.jpg')] bg-cover rounded-4xl shadow p-5">
            <div id="cartItem">
                <!-- Cart items will be rendered here -->
            </div>        
        </section>
    </main>
    <script src="js/dashboard.js"></script>
</body>
</html>
