<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="h-screen bg-[url('images/registerBgImage.jpg')] bg-cover bg-center bg-no-repeat flex items-center justify-center min-h-screen">

    <!-- Registration form collects new account credentials and passes control to shared auth logic -->
    <form id="registerForm" novalidate
        class="bg-[url('images/regImage.png')] bg-cover bg-center py-4 px-11 shadow-xl rounded-2xl w-full max-w-md auth-card">

        <h2 class="text-gray-500 drop-shadow-md text-2xl font-bold italic font-serif ml-2 my-5">Register</h2>

        <label class="sr-only" for="newEmailId">Email address</label>
        <input type="email" placeholder="Enter your email address" id="newEmailId" autocomplete="email"
            class="bg-blue-100 mb-5 px-5 py-2 shadow-xl border-pink-300 border-2 rounded-2xl w-full focus:ring-1 focus:outline-none focus:ring-pink-300"><br>

        <label class="sr-only" for="newPasswordId">Password</label>
        <input type="password" placeholder="Enter your password" id="newPasswordId" autocomplete="new-password"
            class="bg-blue-100 mb-5 px-5 py-2 shadow-xl border-pink-300 border-2 rounded-2xl w-full focus:ring-1 focus:outline-none focus:ring-pink-300"><br>

        <!-- Form actions keep registration, reset, and page navigation grouped together -->
        <div class="flex items-center justify-between gap-3 flex-wrap">
            <input type="submit" value="Create Account" id="createBtn"
                class="bg-pink-400 shadow-md hover:bg-pink-500 text-white border-2 rounded-2xl font-bold px-4 py-2 cursor-pointer app-button">

            <input type="reset" value="Reset"
                class="bg-pink-400 shadow-md hover:bg-pink-500 text-white border-2 rounded-2xl font-bold px-4 py-2 cursor-pointer app-button"><br>

            <button id="loginPageBtn" class="px-2 py-4 font-serif font-bold text-gray-600 italic" type="button">Sign in</button>
        </div>
    </form>

    <script src="js/signin.js" defer></script>
</body>
</html>
